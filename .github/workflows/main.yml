name: SRT to Voice

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Convert SRT to MP3
        run: |
          python srt_to_voice.py

      - name: Upload MP3
        uses: actions/upload-artifact@v4
        with:
          name: output-mp3
          path: output.mp3
